<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Work Monitor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
    <style>
      body { font-family: Arial, sans-serif; background:#111; color:#eee; display:flex; gap:16px; padding:16px }
      #video { border:4px solid #222; max-width: 720px }
      #panel { width:340px }
      .status { background:#1a1a1a; padding:8px; margin-bottom:8px; border-radius:6px }
      #alert-banner {
        display:none; background:#c0392b; color:#fff; font-size:1.2rem;
        font-weight:bold; padding:12px 16px; border-radius:8px; margin-bottom:12px;
        text-align:center;
      }
      #notif-btn {
        background:#2980b9; color:#fff; border:none; padding:8px 14px;
        border-radius:6px; cursor:pointer; margin-bottom:12px; width:100%;
      }
    </style>
  </head>
  <body>
    <div>
      <img id="video" src="" alt="live" />
    </div>
    <div id="panel">
      <h2>Indicators</h2>
      <button id="notif-btn">Enable Focus Notifications</button>
      <div id="alert-banner">&#128683; Stay Focused!</div>
      <div class="status"><b>Faces:</b> <span id="faces">0</span></div>
      <div class="status"><b>Looking away:</b> <span id="away">false</span></div>
      <div class="status"><b>Pose:</b><pre id="poses">[]</pre></div>
      <div class="status"><b>Timestamp:</b> <span id="ts">-</span></div>
    </div>

    <script>
      const socket = io();
      const img = document.getElementById('video');
      const facesEl = document.getElementById('faces');
      const awayEl = document.getElementById('away');
      const posesEl = document.getElementById('poses');
      const tsEl = document.getElementById('ts');
      const alertBanner = document.getElementById('alert-banner');
      const notifBtn = document.getElementById('notif-btn');

      let notifPermission = Notification.permission;
      let lastNotifTime = 0;
      const NOTIF_COOLDOWN_MS = 20000; // notify at most once every 20s

      function updateNotifButton() {
        if (notifPermission === 'granted') {
          notifBtn.textContent = 'Focus Notifications: ON';
          notifBtn.style.background = '#27ae60';
        } else if (notifPermission === 'denied') {
          notifBtn.textContent = 'Notifications blocked (check browser settings)';
          notifBtn.style.background = '#7f8c8d';
        } else {
          notifBtn.textContent = 'Enable Focus Notifications';
          notifBtn.style.background = '#2980b9';
        }
      }

      notifBtn.addEventListener('click', async () => {
        if (notifPermission !== 'granted') {
          notifPermission = await Notification.requestPermission();
          updateNotifButton();
        }
      });

      updateNotifButton();

      function sendFocusNotification() {
        const now = Date.now();
        if (notifPermission !== 'granted') return;
        if (now - lastNotifTime < NOTIF_COOLDOWN_MS) return;
        lastNotifTime = now;
        new Notification('Stay Focused!', {
          body: 'You appear distracted. Get back to work!',
          icon: 'https://cdn-icons-png.flaticon.com/512/709/709612.png',
          requireInteraction: false
        });
      }

      socket.on('frame', (data) => {
        img.src = data.image;
        const s = data.status || {};
        const numFaces = s.num_faces || 0;
        const lookingAway = !!s.looking_away;

        facesEl.textContent = numFaces;
        awayEl.textContent = lookingAway ? 'YES' : 'no';
        awayEl.style.color = lookingAway ? '#e74c3c' : '#2ecc71';
        posesEl.textContent = JSON.stringify(s.face_poses || [], null, 2);
        tsEl.textContent = new Date((s.timestamp || Date.now()) * 1000).toLocaleTimeString();

        const distracted = lookingAway || numFaces === 0;

        // Show in-page alert banner always when distracted
        alertBanner.style.display = distracted ? 'block' : 'none';

        // Send OS notification only when tab is hidden
        if (distracted && document.hidden) {
          sendFocusNotification();
        }
      });

      // Also trigger notification check on visibility change
      document.addEventListener('visibilitychange', () => {
        // Handled in the frame handler above
      });
    </script>
  </body>
</html>
